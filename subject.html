<header>
<span class="material-symbols-outlined">cannabis</span><h1>2025 월드 챔피언 FNC 임호룡 & FNC kaajak</h1>

</header>

    <link rel="stylesheet" href="style.css">
</nav>

<main>

<section class="crop-item">
    <figure>
        <img src="./6dc96518219144388083cafcb162fb4a.jpg" alt="농작물">
        <figcaption>그림 1. 직접 재배한 농작물</figcaption>
    </figure>

    <h3>농작물 명칭: 아스파라거스</h3>

    <ul>
        <li><strong>품종 특징:</strong> 그린 아스파라거스</li>
        <li>
            <strong>재배환경:</strong><br>
            시설재배: 16~25°C 유지, 배수 좋은 토양<br>
            환경재배: 햇빛, pH 6.0~6.5 유지
        </li>
    </ul>

    <h4>유통 구조</h4>
    <p>생산자 → 로컬푸드 직매장 → 소비자</p>

    <hr>

    <h2>😀 온라인 주문하기</h2>

    <div class="input-group">
        <label>주문자 성함</label>
        <input type="text" id="userName" placeholder="실명 입력">
    </div>

    <div class="input-group">
        <label>전화번호</label>
        <input type="text" id="userPhone" placeholder="010-0000-0000">
    </div>

    <div class="input-group">
        <label>배송 방식</label>
        <select id="delivery">
            <option>일반 택배(3,000원)</option>
            <option>새벽 배송(5,000원)</option>
            <option>매장 픽업(무료)</option>
        </select>
    </div>

    <div class="input-group">
        <label>배송 메시지</label>
        <textarea id="message" placeholder="부재시 문 앞에 놓아주세요"></textarea>
    </div>

    <button onclick="processOrder()">지금 바로 주문 완료</button>

    <div id="receipt" class="receipt-box"></div>

</section>

</main>

<footer>
<p>&copy; 2026 임호룡</p>
</footer>

<script>
function processOrder(){
    let name = document.getElementById('userName').value;
    let phone = document.getElementById('userPhone').value;
    let delivery = document.getElementById('delivery').value;
    let message = document.getElementById('message').value;

    if(name === "" || phone === ""){
        alert("정보를 모두 입력해 주세요!");
        return;
    }

    let receipt = document.getElementById('receipt');

    receipt.innerHTML = `
    <h3>주문 확인 영수증</h3>
    <p><strong>이름:</strong> ${name}</p>
    <p><strong>전화번호:</strong> ${phone}</p>
    <p><strong>배송 방식:</strong> ${delivery}</p>
    <p><strong>요청사항:</strong> ${message}</p>
    <hr>
    <p style="text-align:center;">주문해주셔서 감사합니다!</p>
    `;

    receipt.style.display = "block";
}
</script>

</body>
</html>
